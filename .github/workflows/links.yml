name: Check links

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so rot gets caught even without activity.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links in README
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,206,429
            --exclude-mail
            README.md
          # Don't fail the build on flaky/rate-limited hosts; surface a report instead.
          fail: false
