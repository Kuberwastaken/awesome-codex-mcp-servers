<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Awesome Codex MCP Servers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.65" y2="1">
      <stop offset="0" stop-color="#17201c"/>
      <stop offset="0.55" stop-color="#111813"/>
      <stop offset="1" stop-color="#0f1512"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.44" r="0.55">
      <stop offset="0" stop-color="#10a37f" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#10a37f" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#10a37f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4fd1ab"/>
      <stop offset="1" stop-color="#10a37f"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#7ee4c4"/>
      <stop offset="0.55" stop-color="#10a37f"/>
      <stop offset="1" stop-color="#0c6f56"/>
    </radialGradient>
    <radialGradient id="node" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#2a3a33"/>
      <stop offset="1" stop-color="#18231e"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#2b3a33" fill-opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1279" height="639" fill="none" stroke="#2b3a33" stroke-opacity="0.55" stroke-width="1"/>

  <g transform="translate(910 320)">
    <g fill="none" stroke="url(#edge)" stroke-linecap="round">
      <path d="M0 0 C 40 -80, 90 -120, 150 -150" stroke-width="2" stroke-opacity="0.85"/>
      <path d="M0 0 C 90 -40, 160 -50, 210 -30" stroke-width="2.2" stroke-opacity="0.9"/>
      <path d="M0 0 C 80 40, 150 70, 200 110" stroke-width="2" stroke-opacity="0.8"/>
      <path d="M0 0 C 20 90, 30 140, 60 190" stroke-width="1.8" stroke-opacity="0.7"/>
      <path d="M0 0 C -70 60, -120 90, -170 110" stroke-width="1.8" stroke-opacity="0.65"/>
      <path d="M0 0 C -80 -20, -140 -30, -185 -20" stroke-width="1.8" stroke-opacity="0.6"/>
      <path d="M0 0 C -40 -70, -70 -120, -95 -160" stroke-width="1.8" stroke-opacity="0.7"/>
    </g>
    <circle cx="0" cy="0" r="46" fill="#10a37f" fill-opacity="0.25" filter="url(#soft)"/>
    <circle cx="0" cy="0" r="30" fill="url(#hub)" stroke="#7ee4c4" stroke-opacity="0.6" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="14" fill="#0f1512" fill-opacity="0.55"/>
    <circle cx="0" cy="0" r="6" fill="#bff2e2"/>
    <g stroke="#4fd1ab" stroke-opacity="0.55" stroke-width="1.5">
      <circle cx="150" cy="-150" r="15" fill="url(#node)"/>
      <circle cx="210" cy="-30" r="19" fill="url(#node)"/>
      <circle cx="200" cy="110" r="16" fill="url(#node)"/>
      <circle cx="60" cy="190" r="13" fill="url(#node)"/>
      <circle cx="-170" cy="110" r="14" fill="url(#node)"/>
      <circle cx="-185" cy="-20" r="15" fill="url(#node)"/>
      <circle cx="-95" cy="-160" r="12" fill="url(#node)"/>
    </g>
    <g fill="#4fd1ab">
      <circle cx="210" cy="-30" r="4.5" fill-opacity="0.9"/>
      <circle cx="150" cy="-150" r="3.5" fill-opacity="0.8"/>
      <circle cx="200" cy="110" r="3.5" fill-opacity="0.75"/>
      <circle cx="-185" cy="-20" r="3.5" fill-opacity="0.7"/>
    </g>
  </g>

  <rect x="96" y="196" width="4" height="150" rx="2" fill="url(#edge)" fill-opacity="0.9"/>

  <g font-family="Helvetica, Arial, sans-serif">
    <text x="124" y="214" fill="#4fd1ab" fill-opacity="0.85" font-size="18" font-weight="700" letter-spacing="6">MODEL CONTEXT PROTOCOL</text>
    <text x="122" y="288" fill="#eef4f1" font-size="70" font-weight="700" letter-spacing="-1">Awesome Codex</text>
    <text x="122" y="360" fill="#eef4f1" font-size="70" font-weight="700" letter-spacing="-1">MCP Servers</text>
    <text x="124" y="416" fill="#a9b4ae" font-size="27" font-weight="400">A curated, searchable catalog of MCP</text>
    <text x="124" y="452" fill="#a9b4ae" font-size="27" font-weight="400">servers for OpenAI Codex</text>
    <text x="124" y="536" fill="#6f7d76" font-size="20" font-weight="400" letter-spacing="0.5">kuber.studio/awesome-codex-mcp-servers</text>
  </g>
